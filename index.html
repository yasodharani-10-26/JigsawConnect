  <style>
    :root{
      --ink:#12302b;
      --forest:#1e5b4f;
      --mint:#dff2e8;
      --leaf:#75b798;
      --cream:#fbf8f1;
      --gold:#e7b95d;
      --line:#dce8e1;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'DM Sans',sans-serif;
      color:var(--ink);
      background:var(--cream);
    }
    .heading-font{font-family:'Fraunces',serif}
    .page-shell{
      width:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 10% 8%, rgba(117,183,152,.12), transparent 25%),
        radial-gradient(circle at 93% 28%, rgba(231,185,93,.12), transparent 20%),
        var(--cream);
    }
    .nav-glass{
      background:rgba(251,248,241,.82);
      backdrop-filter: blur(18px);
      border-bottom:1px solid rgba(30,91,79,.08);
    }
    .hero-card{
      border-radius:32px;
      overflow:hidden;
      min-height:560px;
      background:#dcefe6;
      position:relative;
    }
    .hero-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(10,44,38,.78) 0%, rgba(10,44,38,.5) 45%, rgba(10,44,38,.12) 100%);
      z-index:1;
    }
    .hero-card img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
    .hero-content{position:relative; z-index:2}
    .feature-card{
      transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease;
    }
    .feature-card:hover{
      transform:translateY(-8px);
      box-shadow:0 20px 40px rgba(21,72,61,.11);
      border-color:#b7d8c8;
    }
    .event-card{
      background:
        linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.95)),
        radial-gradient(circle at top right,rgba(117,183,152,.2),transparent 45%);
    }
    .chat-scroll::-webkit-scrollbar{width:6px}
    .chat-scroll::-webkit-scrollbar-thumb{background:#bad8ca;border-radius:999px}
    .message{animation:riseIn .35s ease both}
    @keyframes riseIn{
      from{opacity:0; transform:translateY(8px)}
      to{opacity:1; transform:translateY(0)}
    }
    .mobile-panel{display:none}
    .mobile-panel.open{display:block}
    @media(max-width:900px){
      .hero-card{min-height:620px}
      .hero-card::after{background:linear-gradient(180deg, rgba(10,44,38,.72), rgba(10,44,38,.4))}
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const menuButton = document.getElementById('menuButton');
      const mobilePanel = document.getElementById('mobilePanel');
      menuButton.addEventListener('click', () => {
        const isOpen = mobilePanel.classList.toggle('open');
        menuButton.setAttribute('aria-expanded', String(isOpen));
      });

      mobilePanel.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          mobilePanel.classList.remove('open');
          menuButton.setAttribute('aria-expanded', 'false');
        });
      });

      const chatForm = document.getElementById('chatForm');
      const chatInput = document.getElementById('chatInput');
      const chatMessages = document.getElementById('chatMessages');
      const quickPrompts = document.querySelectorAll('.quick-prompt');

      const replies = [
        "Great question. Try breaking it into three parts: concept, example, and a quick self-check. I can help you make a 20-minute study plan for it.",
        "For your team, assign one person to research, one to summarize, one to present, and one to review. That keeps collaboration balanced.",
        "A good quiz strategy is to revise in short rounds, note weak topics, then test yourself again after a short break.",
        "You can turn this into a simple checklist and complete the hardest item first while your focus is highest."
      ];

      function addMessage(text, type) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message flex gap-2 items-start ' + (type === 'user' ? 'justify-end' : '');
        if (type === 'assistant') {
          wrapper.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-[#1e5b4f] text-white flex items-center justify-center shrink-0"><i data-lucide="bot" class="w-4 h-4"></i></div>
            <div class="max-w-[82%] rounded-2xl rounded-tl-sm bg-[#e6f3ec] px-4 py-3 text-sm leading-6 text-[#24463f]"></div>
          `;
          wrapper.querySelector('div:last-child').textContent = text;
        } else {
          wrapper.innerHTML = `
            <div class="max-w-[82%] rounded-2xl rounded-tr-sm bg-[#1e5b4f] px-4 py-3 text-sm leading-6 text-white"></div>
          `;
          wrapper.querySelector('div').textContent = text;
        }
        chatMessages.appendChild(wrapper);
        lucide.createIcons();
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function handleUserMessage(message) {
        const trimmed = message.trim();
        if (!trimmed) return;
        addMessage(trimmed, 'user');
        chatInput.value = '';
        setTimeout(() => {
          const response = replies[Math.floor(Math.random() * replies.length)];
          addMessage(response, 'assistant');
        }, 450);
      }

      chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        handleUserMessage(chatInput.value);
      });

      quickPrompts.forEach(btn => {
        btn.addEventListener('click', () => {
          handleUserMessage(btn.textContent.trim());
        });
      });
    });
  </script>
