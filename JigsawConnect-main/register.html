<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | JigsawConnect</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       GLOBAL DESIGN MATRIX & VARIABLES
       ========================================================================== */
    :root {
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(15, 23, 42, 0.6);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: rgba(6, 182, 212, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      /* Status Colors */
      --status-error: #ef4444;
      --status-error-bg: rgba(239, 68, 68, 0.1);
      --status-warning: #f59e0b;
      --status-warning-bg: rgba(245, 158, 11, 0.1);
      --status-success: #10b981;
      --status-success-bg: rgba(16, 185, 129, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* GLASSMORPHISM CARD CORE COMPONENT */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 32px;
      border-radius: 24px;
      border: 1px solid var(--card-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* DYNAMIC RUNTIME STATUS NOTIFICATION BANNER */
    #msg {
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      border: 1px solid transparent;
      animation: msgSlideIn 0.3s ease;
    }

    /* HIGH-INTERACTIVE FORM STRUCTURES */
    .form-group {
      position: relative;
      margin-bottom: 18px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: all 0.25s ease;
    }

    input[type="password"], 
    input[type="text"].pass-input {
      padding-right: 46px;
    }

    input:hover, select:hover { border-color: rgba(255, 255, 255, 0.2); }

    input:focus, select:focus {
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px var(--input-focus);
    }

    input::placeholder { color: #64748b; }

    select option {
      background: #0f172a;
      color: var(--text-main);
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .password-toggle:hover { color: var(--text-main); }

    /* BUTTONS */
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #2563eb);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
      transition: all 0.25s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
    }

    .login-redirect {
      color: var(--text-muted);
      text-decoration: none;
      display: block;
      text-align: center;
      font-size: 14px;
      margin-top: 24px;
    }

    .login-redirect:hover, .login-redirect:hover strong { color: var(--primary); }
    .login-redirect strong { color: #fff; }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Create Account</h2>
  <p class="subtitle">Join the StudyConnect node network</p>

  <div id="msg"></div>

  <form id="registerForm" novalidate>
    <div class="form-group">
      <input type="text" id="name" placeholder="Full Name" autocomplete="name" required>
    </div>

    <div class="form-group">
      <input type="email" id="email" placeholder="Email Address" autocomplete="email" required>
    </div>

    <div class="form-group">
      <input type="password" id="pass" placeholder="Password" autocomplete="new-password" required>
      <button type="button" class="password-toggle" data-target="pass" aria-label="Toggle display view">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>

    <div class="form-group">
      <input type="password" id="cpass" placeholder="Confirm Password" autocomplete="new-password" required>
      <button type="button" class="password-toggle" data-target="cpass" aria-label="Toggle display view">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>

    <div class="form-group">
      <select id="role" aria-label="Account Access Permissions Role" required>
        <option value="" disabled selected>Select System Role</option>
        <option value="student">Student</option>
        <option value="admin">Administrator</option>
      </select>
    </div>

    <button type="submit">Register Account</button>
  </form>

  <a href="student-login.html" class="login-redirect">
    Already have an account? <strong>Sign In</strong>
  </a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

  // Firebase Configuration Structure
  const firebaseConfig = {
    apiKey: "AIzaSyCaCkliRZk8HmNtOsJpoA084YhNY7MeMWM",
    authDomain: "jigsawconnect-677da.firebaseapp.com",
    databaseURL: "https://jigsawconnect-677da-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jigsawconnect-677da",
    storageBucket: "jigsawconnect-677da.firebasestorage.app",
    messagingSenderId: "200774226361",
    appId: "1:200774226361:web:266cb216968403793f6668"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const form = document.getElementById("registerForm");
  const msgBanner = document.getElementById("msg");

  function showBanner(text, state) {
    msgBanner.textContent = text;
    msgBanner.style.display = "block";
    
    if (state === "error") {
      msgBanner.style.background = "var(--status-error-bg)";
      msgBanner.style.borderColor = "var(--status-error)";
      msgBanner.style.color = "var(--status-error)";
    } else if (state === "success") {
      msgBanner.style.background = "var(--status-success-bg)";
      msgBanner.style.borderColor = "var(--status-success)";
      msgBanner.style.color = "var(--status-success)";
    }
  }

  /* ----- Inline Password Visibility Toggle Engine ----- */
  document.querySelectorAll(".password-toggle").forEach(button => {
    button.addEventListener("click", () => {
      const targetId = button.getAttribute("data-target");
      const targetInput = document.getElementById(targetId);
      
      if (targetInput.type === "password") {
        targetInput.type = "text";
        targetInput.classList.add("pass-input");
        button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
      } else {
        targetInput.type = "password";
        targetInput.classList.remove("pass-input");
        button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      }
    });
  });

  /* ----- Cloud Execution Pipeline ----- */
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msgBanner.style.display = "none";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass").value;
    const confirmPassword = document.getElementById("cpass").value;
    const role = document.getElementById("role").value;

    if (!name || !email || !password || !confirmPassword || !role) {
      showBanner("All fields are mandatory.", "error");
      return;
    }

    if (password.length < 6) {
      showBanner("Password must contain at least 6 characters.", "error");
      return;
    }

    if (password !== confirmPassword) {
      showBanner("Confirmed passwords mismatch.", "error");
      return;
    }

    try {
      // 1. Create user node inside Firebase Authentication Dashboard
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // 2. Map profile structural nodes to Realtime Database
      await set(ref(db, "users/" + user.uid), {
        fullName: name,
        email: email,
        role: role,
        createdOn: Date.now()
      });

      showBanner(`Registration Successful! Provisioning ${role} workspace...`, "success");
      
      setTimeout(() => {
        window.location.href = "student-login.html";
      }, 1500);

    } catch (error) {
      console.error("Firebase Registration Error:", error.code, error.message);
      
      switch (error.code) {
        case "auth/email-already-in-use":
          showBanner("This email address is already registered.", "error");
          break;
        case "auth/invalid-email":
          showBanner("Malformed email layout syntax pattern.", "error");
          break;
        case "auth/weak-password":
          showBanner("Password tier is too weak.", "error");
          break;
        default:
          showBanner(`Error: ${error.message}`, "error");
      }
    }
  });
</script>

</body>
</html>
