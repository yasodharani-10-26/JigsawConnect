<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login | StudyConnect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
    padding:20px;
}

.login-card{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:35px;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.login-header{
    text-align:center;
    margin-bottom:25px;
}

.login-header .icon{
    font-size:60px;
    margin-bottom:10px;
}

.login-header h1{
    margin-bottom:5px;
}

.login-header p{
    opacity:.8;
}

#loginMessage{
    display:none;
    margin-bottom:15px;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input{
    width:100%;
    padding:13px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:15px;
}

.login-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:white;
    color:#1e3a8a;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
}

.links{
    text-align:center;
    margin-top:18px;
}

.links a{
    color:white;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

.back-home{
    margin-top:12px;
}

@media(max-width:500px){
    .login-card{
        padding:25px;
    }
}
</style>
</head>
<body>

<div class="login-card">

    <div class="login-header">
        <div class="icon">🎓</div>
        <h1>Student Login</h1>
        <p>Login to your StudyConnect Account</p>
    </div>

    <div id="loginMessage"></div>

  <form id="studentLoginForm">

  <div class="form-group">
    <label>Email</label>
    <input
      type="email"
      id="username"
      placeholder="Enter Email"
      required
    >
  </div>

  <div class="form-group">
    <label>Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter Password"
      required
    >
  </div>

  <button type="submit" class="login-btn">
    Login
  </button>

</form>
    <div class="links">
        <p>
            Don't have an account?
            <a href="register.html">Create Account</a>
        </p>

        <div class="back-home">
            <a href="index.html">⬅ Back to Home</a>
        </div>
    </div>

</div>

<script type="module">

import {
  auth,
  signInWithEmailAndPassword
} from "./firebase.js";

const form = document.getElementById("studentLoginForm");
const msg = document.getElementById("loginMessage");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = document.getElementById("username");
  const password = document.getElementById("password");

  if (!email || !password) {
    console.log("Input IDs not found");
    return;
  }

  try {

    await signInWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value.trim()
    );

    msg.style.display = "block";
    msg.style.background = "lightgreen";
    msg.style.color = "black";
    msg.innerText = "Login Successful ✅";

    setTimeout(() => {
      window.location.href = "student-dashboard.html";
    }, 1000);

  } catch (error) {

    msg.style.display = "block";
    msg.style.background = "red";
    msg.style.color = "white";

    msg.innerText = error.message;

    console.error(error);
  }

});
const helpBtn = document.getElementById("helpBtn");

if(helpBtn){
  helpBtn.addEventListener("click", () => {
    document.getElementById("aiPopup").classList.toggle("hidden");
  });
}
</script>
</script>
</body>
</html>
