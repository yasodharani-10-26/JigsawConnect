
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login – StudyConnect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a>
    <button class="menu-toggle" aria-label="Open menu"><span></span><span></span><span></span></button>
    <div class="nav-links">
      <a href="login.html">Back</a>
      <a href="admin-login.html">Admin Login</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Student Login</h1>
      <p class="subtitle">Login with Student ID or email</p>
      <div id="loginMessage" class="login-message" style="display:none;"></div>

      <form id="studentLoginForm">
        <div class="form-group">
          <label for="username">Student ID / Email / Name</label>
          <input type="text" id="username" placeholder="e.g. STU001" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Login as Student</button>
      </form>

      <p class="auth-link demo-hint">
        <strong>Demo:</strong> <code>STU001</code> / <code>pass123</code><br />
        Accounts are created by admin.
      </p>
    </div>
  </main>

 <script type="module" src="app.js"></script>
</body>
</html>
