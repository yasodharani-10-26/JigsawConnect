<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | JigsawConnect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;

      --status-error: #ef4444;
      --status-error-bg: rgba(239, 68, 68, 0.1);
      --status-success: #10b981;
      --status-success-bg: rgba(16, 185, 129, 0.1);
      --status-warning: #f59e0b;
      --status-warning-bg: rgba(245, 158, 11, 0.1);
      --streak-flame: #f97316;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text-main);
      padding: 32px 20px 60px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    /* ---------- Loading / Error states ---------- */
    #loadingState, #errorState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      gap: 14px;
    }
    #errorState { display: none; }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .muted { color: var(--text-muted); font-size: 14px; }

    /* ---------- Header ---------- */
    #appContent { display: none; }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease;
    }

    .avatar {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .profile-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      word-break: break-word;
    }

    .role-pill {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      background: var(--status-success-bg);
      color: var(--status-success);
      border: 1px solid rgba(16,185,129,0.25);
    }

    /* ---------- Streak card ---------- */
    .streak-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, rgba(249,115,22,0.16), rgba(249,115,22,0.03));
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 18px;
      padding: 16px 20px;
      margin-left: auto;
      min-width: 150px;
    }

    .streak-flame { font-size: 30px; line-height: 1; }
    .streak-count { font-size: 1.6rem; font-weight: 800; color: var(--streak-flame); line-height: 1; }
    .streak-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ---------- Section cards ---------- */
    .section-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 26px 28px;
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease;
    }

    .section-card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ---------- Detail grid ---------- */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .detail-item label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .detail-item .value {
      font-size: 14.5px;
      font-weight: 600;
      word-break: break-word;
    }

    /* ---------- Activity list (quizzes / hackerrank) ---------- */
    .activity-list { display: flex; flex-direction: column; gap: 10px; }

    .activity-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      transition: border-color 0.2s ease;
    }
    .activity-row:hover { border-color: rgba(255,255,255,0.18); }

    .activity-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      background: rgba(6,182,212,0.12);
      color: var(--primary);
    }

    .activity-main { flex: 1; min-width: 0; }
    .activity-title { font-weight: 600; font-size: 14px; }
    .activity-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
      text-transform: capitalize;
    }
    .status-completed { background: var(--status-success-bg); color: var(--status-success); }
    .status-inprogress { background: var(--status-warning-bg); color: var(--status-warning); }
    .status-failed { background: var(--status-error-bg); color: var(--status-error); }

    .score-tag {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      background: rgba(255,255,255,0.06);
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: var(--text-muted);
      font-size: 13.5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .profile-header { flex-wrap: wrap; }
      .streak-card { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Loading state -->
  <div id="loadingState">
    <div class="spinner"></div>
    <p class="muted">Loading your profile...</p>
  </div>

  <!-- Error / not signed in state -->
  <div id="errorState">
    <p class="muted" id="errorText">You need to sign in to view your profile.</p>
    <a href="student-login.html" style="color: var(--primary); font-weight:600; text-decoration:none;">Go to Sign In &rarr;</a>
  </div>

  <!-- Main content -->
  <div id="appContent">

    <!-- Header: identity + streak -->
    <div class="profile-header">
      <div class="avatar" id="avatarInitial">?</div>
      <div>
        <h1 id="headerEmail">-</h1>
        <span class="role-pill" id="rolePill">-</span>
      </div>

      <div class="streak-card">
        <div class="streak-flame">🔥</div>
        <div>
          <div class="streak-count"><span id="streakCount">0</span></div>
          <div class="streak-label">day streak</div>
        </div>
      </div>
    </div>

    <!-- Registered details -->
    <div class="section-card">
      <h2>📋 Profile Details</h2>
      <div class="detail-grid" id="detailGrid">
        <!-- filled dynamically -->
      </div>
    </div>

    <!-- Quizzes attempted -->
    <div class="section-card">
      <h2>📝 Quizzes Attempted</h2>
      <div class="activity-list" id="quizList">
        <div class="empty-state">Loading quizzes...</div>
      </div>
    </div>

    <!-- HackerRank exams -->
    <div class="section-card">
      <h2>💻 HackerRank Exams</h2>
      <div class="activity-list" id="hackerrankList">
        <div class="empty-state">Loading exams...</div>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCaCkliRZk8HmNtOsJpoA084YhNY7MeMWM",
    authDomain: "jigsawconnect-677da.firebaseapp.com",
    databaseURL: "https://jigsawconnect-677da-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jigsawconnect-677da",
    storageBucket: "jigsawconnect-677da.firebasestorage.app",
    messagingSenderId: "200774226361",
    appId: "1:200774226361:web:266cb216968403793f6668"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const loadingState = document.getElementById("loadingState");
  const errorState = document.getElementById("errorState");
  const errorText = document.getElementById("errorText");
  const appContent = document.getElementById("appContent");

  function showError(msg) {
    loadingState.style.display = "none";
    appContent.style.display = "none";
    errorText.textContent = msg;
    errorState.style.display = "flex";
  }

  /* ---------------- Streak calculation ----------------
     Works off an "activityDates" object under the user node:
     users/{uid}/activityDates: { "2026-07-10": true, "2026-07-11": true, ... }
     If that node doesn't exist, falls back to a stored "streak" number field.
  ------------------------------------------------------- */
  function calculateStreak(activityDates) {
    if (!activityDates || typeof activityDates !== "object") return 0;

    const dateKeys = new Set(Object.keys(activityDates));
    let streak = 0;
    let cursor = new Date();

    while (true) {
      const key = cursor.toISOString().slice(0, 10); // YYYY-MM-DD
      if (dateKeys.has(key)) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function fmtDate(value) {
    if (!value) return "-";
    const d = typeof value === "number" ? new Date(value) : new Date(value);
    if (isNaN(d.getTime())) return String(value);
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  function statusClass(status) {
    const s = (status || "").toLowerCase();
    if (s === "completed" || s === "passed") return "status-completed";
    if (s === "failed") return "status-failed";
    return "status-inprogress";
  }

  function renderActivityList(containerEl, items, iconEmoji, emptyMsg) {
    containerEl.innerHTML = "";

    if (!items || items.length === 0) {
      containerEl.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
      return;
    }

    // Most recent first
    items.sort((a, b) => (b.date || 0) - (a.date || 0));

    items.forEach(item => {
      const row = document.createElement("div");
      row.className = "activity-row";
      row.innerHTML = `
        <div class="activity-icon">${iconEmoji}</div>
        <div class="activity-main">
          <div class="activity-title">${item.title || "Untitled"}</div>
          <div class="activity-meta">${fmtDate(item.date)}${item.duration ? " · " + item.duration : ""}</div>
        </div>
        ${item.score !== undefined && item.score !== null ? `<div class="score-tag">${item.score}</div>` : ""}
        <div class="status-badge ${statusClass(item.status)}">${item.status || "In progress"}</div>
      `;
      containerEl.appendChild(row);
    });
  }

  function objectToArray(obj) {
    if (!obj) return [];
    return Object.keys(obj).map(key => ({ id: key, ...obj[key] }));
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      showError("You need to sign in to view your profile.");
      return;
    }

    try {
      const snap = await get(ref(db, "users/" + user.uid));

      if (!snap.exists()) {
        showError("No profile data found for this account.");
        return;
      }

      const data = snap.val();

      // ---- Header ----
      const email = data.email || user.email || "-";
      document.getElementById("avatarInitial").textContent = email.charAt(0).toUpperCase();
      document.getElementById("headerEmail").textContent = email;
      document.getElementById("rolePill").textContent = data.role || "-";

      // ---- Streak ----
      const streak = data.activityDates
        ? calculateStreak(data.activityDates)
        : (data.streak || 0);
      document.getElementById("streakCount").textContent = streak;

      // ---- Registered / student details ----
      const detailGrid = document.getElementById("detailGrid");
      const fields = [
        { label: "Account Email", value: data.email },
        { label: "Role", value: data.role },
        { label: "Roll Number", value: data.rollNumber },
        { label: "Branch", value: data.branch },
        { label: "Section", value: data.section },
        { label: "Year", value: data.year ? data.year + " Year" : null },
        { label: "Institute Email", value: data.instituteEmail },
        { label: "Joined On", value: data.createdOn ? fmtDate(data.createdOn) : null }
      ].filter(f => f.value !== undefined && f.value !== null && f.value !== "");

      detailGrid.innerHTML = fields.map(f => `
        <div class="detail-item">
          <label>${f.label}</label>
          <div class="value">${f.value}</div>
        </div>
      `).join("");

      // ---- Quizzes attempted: users/{uid}/quizzes ----
      const quizzes = objectToArray(data.quizzes);
      renderActivityList(
        document.getElementById("quizList"),
        quizzes,
        "📝",
        "No quizzes attempted yet."
      );

      // ---- HackerRank exams: users/{uid}/hackerrank ----
      const hackerrankExams = objectToArray(data.hackerrank);
      renderActivityList(
        document.getElementById("hackerrankList"),
        hackerrankExams,
        "💻",
        "No HackerRank exams attempted yet."
      );

      loadingState.style.display = "none";
      appContent.style.display = "block";

    } catch (err) {
      console.error("Profile load error:", err);
      showError("Something went wrong while loading your profile.");
    }
  });
</script>

</body>
</html>
