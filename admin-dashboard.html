<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard – StudyConnect</title>

  <style>
    /* =========================
       ROOT
    ========================== */
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --accent: #06b6d4;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
      --shadow: 0 10px 30px rgba(0,0,0,0.3);
      font-family: "Segoe UI", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    /* =========================
       NAVBAR
    ========================== */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    /* =========================
       HEADER
    ========================== */
    .page-header {
      padding: 120px 20px 40px;
      text-align: center;
      background: linear-gradient(135deg, #1d4ed8, #06b6d4);
    }

    .page-header h1 {
      font-size: 3rem;
    }

    .page-header p {
      margin-top: 10px;
      opacity: 0.9;
    }

    /* =========================
       MAIN
    ========================== */
    .main-content {
      padding: 40px 20px;
      max-width: 1200px;
      margin: auto;
    }

    /* =========================
       STATS
    ========================== */
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      gap: 15px;
      align-items: center;
      border: 1px solid var(--border);
      transition: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-icon {
      font-size: 2rem;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
      color: var(--primary);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
    }

    /* =========================
       PANELS
    ========================== */
    .admin-panel {
      background: var(--card);
      padding: 25px;
      border-radius: var(--radius);
      margin-bottom: 30px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .admin-section-title {
      color: var(--primary);
      margin-bottom: 15px;
    }

    .badge {
      background: rgba(59,130,246,0.2);
      color: var(--primary);
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* =========================
       FORMS
    ========================== */
    .admin-upload-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 14px;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }

    input:focus, select:focus {
      outline: 2px solid var(--primary);
    }

    /* =========================
       BUTTON
    ========================== */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    /* =========================
       TABLE
    ========================== */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .admin-table th {
      background: #1d4ed8;
      color: white;
      padding: 12px;
    }

    .admin-table td {
      padding: 12px;
      border-bottom: 1px solid #334155;
    }

    .admin-table tr:hover {
      background: #0f172a;
    }

    /* =========================
       CARDS
    ========================== */
    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    /* =========================
       FOOTER
    ========================== */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      margin-top: 20px;
    }

    /* =========================
       RESPONSIVE
    ========================== */
    @media(max-width:768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .page-header h1 {
        font-size: 2rem;
      }

      .navbar {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body id="adminPage">

  <!-- NAV -->
  <nav class="navbar">
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a>
    <div class="nav-links">
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="index.html">Logout</a>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="page-header">
    <h1>Admin Dashboard</h1>
    <p>Students · Teams · Resources · Quiz Management</p>
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- STATS -->
    <div class="admin-stats">
      <div class="stat-card"><div class="stat-icon">🎓</div><div><div class="stat-value">0</div><div class="stat-label">Students</div></div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-value">0</div><div class="stat-label">Teams</div></div></div>
      <div class="stat-card"><div class="stat-icon">📄</div><div><div class="stat-value">0</div><div class="stat-label">Resources</div></div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-value">0</div><div class="stat-label">Scores</div></div></div>
    </div>

  <!-- STUDENTS -->
<section class="admin-panel">
  <h2 class="admin-section-title">Add Student</h2>

  <form id="studentForm" class="admin-upload-form">

    <div class="form-group">
      <label>Student Name</label>
      <input
        type="text"
        id="studentName"
        placeholder="Enter student name"
        required
      >
    </div>

    <div class="form-group">
      <label>Student ID</label>
      <input
        type="text"
        id="studentId"
        placeholder="Enter student ID"
        required
      >
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        id="studentEmail"
        placeholder="Enter email"
        required
      >
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        id="studentPassword"
        placeholder="Enter password"
        required
      >
    </div>

    <button type="submit" class="btn btn-primary">
      ➕ Add Student
    </button>

  </form>
</section>

    <!-- TABLE -->
    <section class="admin-panel">
      <h2 class="admin-section-title">Students List</h2>

      <table class="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Email</th>
            <th>Team</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

  </main>

  <footer class="footer">
    © 2026 StudyConnect
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
