<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | StudyConnect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #070a13;
      --card-bg: rgba(16, 24, 42, 0.55);
      --border: rgba(255, 255, 255, 0.06);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #4f46e5;
      --accent: #06b6d4;
      --success: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 6%;
      background: rgba(7, 10, 19, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .nav-badge {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 6px 14px;
      border-radius: 20px;
      color: #f59e0b;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* MAIN CONTAINER */
    .admin-container {
      max-width: 800px;
      width: 100%;
      margin: 50px auto;
      padding: 0 20px;
    }

    .dashboard-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 30px;
    }

    /* FORM CONTROLS */
    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f172a;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    select:focus, input:focus {
      border-color: var(--accent);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
      margin-top: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(79, 70, 229, 0.5);
    }

    /* STATUS LOG */
    .status-box {
      display: none;
      margin-top: 24px;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }

    .status-success {
      display: block;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .footer {
      text-align: center;
      padding: 30px;
      margin-top: auto;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a>
    <div class="nav-badge">🔒 Control Console</div>
  </nav>

  <main class="admin-container">
    <div class="dashboard-card">
      <h1>Quiz Deployment Engine</h1>
      <p class="subtitle">Staging environment to dynamically inject adaptive assessments into the student runtime network.</p>

      <form id="adminQuizForm">
        
        <div class="form-group">
          <label for="quizSubject">Target Academic Branch / Subject</label>
          <select id="quizSubject" required>
            <option value="cse">💻 Core CSE (Computer Science)</option>
            <option value="csd">🎨 CSD (Design)</option>
            <option value="csm">🤖 CSM (AI & ML)</option>
            <option value="cai">🧠 CAI (AI & Data Science)</option>
            <option value="cyber">🔒 Cyber Security</option>
            <option value="it">🌐 IT</option>
            <option value="ece">🎛️ ECE</option>
            <option value="eee">⚡ EEE</option>
            <option value="mech">⚙️ Mechanical</option>
            <option value="mca">📊 MCA</option>
            <option value="mba">📈 MBA</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quizTopic">Assessment Topic / Title</label>
          <input type="text" id="quizTopic" placeholder="e.g., Data Structures, Microchips, Business Analytics" required />
        </div>

        <div class="form-group">
          <label for="totalQuestions">Volume of Questions Matrix</label>
          <input type="number" id="totalQuestions" min="3" max="25" value="5" required />
        </div>

        <button type="submit" class="btn-submit">🚀 Generate & Deploy Quiz Matrix</button>
      </form>

      <div id="statusNotification" class="status-box"></div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 StudyConnect | Automated Admin Infrastructure Module
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    // మీ ఒరిజినల్ Firebase కాన్ఫిగరేషన్ పారామితులు
    const firebaseConfig = {
      apiKey: "AIzaSyCaCkliRZk8HmNtOsJpoA084YhNY7MeMWM",
      authDomain: "jigsawconnect-677da.firebaseapp.com",
      databaseURL: "https://jigsawconnect-677da-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jigsawconnect-677da",
      storageBucket: "jigsawconnect-677da.firebasestorage.app",
      messagingSenderId: "200774226361",
      appId: "1:200774226361:web:266cb216968403793f6668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById("adminQuizForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const subject = document.getElementById("quizSubject").value;
      const topic = document.getElementById("quizTopic").value.trim();
      const count = parseInt(document.getElementById("totalQuestions").value, 10);
      const statusBox = document.getElementById("statusNotification");

      try {
        // Firebase లోని 'quizzes' నోడ్ కి రిఫరెన్స్ సెట్ చేయడం
        const quizzesRef = ref(db, "quizzes");
        const newQuizNode = push(quizzesRef);

        // స్టూడెంట్ పేజీ రీడ్ చేసే స్ట్రక్చర్ లో డేటాని క్లౌడ్ లో సేవ్ చేయడం
        await set(newQuizNode, {
          subject: subject,
          topic: topic,
          totalQuestions: count,
          timestamp: Date.now()
        });

        // సక్సెస్ అలర్ట్ సిగ్నల్
        statusBox.className = "status-box status-success";
        statusBox.innerHTML = `✅ <strong>Success:</strong> [${subject.toUpperCase()}] "${topic}" with ${count} questions deployed to student cluster successfully!`;
        
        // ఫార్మ్ రీసెట్ చేయడం
        document.getElementById("quizTopic").value = "";
        document.getElementById("totalQuestions").value = "5";

      } catch (err) {
        console.error("Deployment failure:", err);
        statusBox.style.display = "block";
        statusBox.style.background = "rgba(239, 68, 68, 0.1)";
        statusBox.style.borderColor = "rgba(239, 68, 68, 0.3)";
        statusBox.style.color = "#ef4444";
        statusBox.textContent = "❌ Error pushing quiz structure to Firebase infrastructure.";
      }
    });
  </script>
</body>
</html>
