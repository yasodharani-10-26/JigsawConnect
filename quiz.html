<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Quiz Challenge | StudyConnect</title> 
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap" rel="stylesheet"> 
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style> 
    :root {
      --bg: #0b0f19; 
      --card-bg: rgba(20, 30, 54, 0.45); 
      --border: rgba(255, 255, 255, 0.08); 
      --text-main: #f8fafc; 
      --text-muted: #94a3b8; 
      --accent-cyan: #06b6d4; 
      --accent-blue: #2563eb; 
      --success: #10b981; 
      --danger: #ef4444;
      --warning: #f59e0b; 
    } 

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; } 
    body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; } 

    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 6%; background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; } 
    .logo { font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; } 
    .logo span { color: var(--accent-cyan); } 
    .nav-links { display: flex; gap: 24px; align-items: center; } 
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 600; } 
    .nav-links a.active { color: var(--accent-cyan); } 

    .main-workspace-wrapper { width: 100%; max-width: 1440px; margin: 0 auto; padding: 30px 20px; } 
    .content-stream { display: flex; flex-direction: column; gap: 24px; } 

    .page-header { padding: 32px; background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(6, 182, 212, 0.04)); border: 1px solid var(--border); border-radius: 24px; } 
    .page-header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; } 
    
    .quizzes-grid { display: flex; flex-direction: column; gap: 16px; }

    .panel-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); margin-bottom: 12px;}
    .panel-title { font-size: 16px; font-weight: 700; color: #fff; display: flex; justify-content: space-between; align-items: center; width: 100%;}
    
    .hackerrank-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #2ec866; color: #0e141e; text-decoration: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; border: none; cursor: pointer; width: 100%; transition: all 0.2s; text-align: center; margin-top: 10px;}
    .hackerrank-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46, 200, 102, 0.3); }

    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-control { padding: 12px 16px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 14px; width: 100%; }
    
    .quiz-quadrant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .quadrant-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 18px; backdrop-filter: blur(12px); }
    .quadrant-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px;}
    .empty-note { color: var(--text-muted); font-size: 12px; padding: 12px 4px; }

    /* ---- HackerRank Modal ---- */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000; visibility: hidden; opacity: 0; transition: all 0.3s ease; }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-box { background: #141e36; border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(-20px); transition: all 0.3s ease; }
    .modal-overlay.active .modal-box { transform: translateY(0); }
    .modal-header { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; flex: 1; }
    .btn-submit { background: var(--accent-blue); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; flex: 2; transition: all 0.2s; }
    .btn-submit:hover { background: #1d4ed8; }

    @media (max-width: 700px) {
      .quiz-quadrant-grid { grid-template-columns: 1fr; }
    }
  </style> 
</head> 

<body> 

  <nav class="navbar"> 
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a> 
    <div class="nav-links"> 
      <a href="admin-dashboard.html">Dashboard</a> 
      <a href="leaderboard.html">Leaderboard</a> 
      <a href="profile.html">My Profile</a>
      <a href="quiz.html" class="active">Quizzes</a> 
      <a href="index.html">Logout</a> 
    </div> 
  </nav> 

  <div class="main-workspace-wrapper"> 
    <main class="content-stream"> 
      
      <div class="page-header"> 
        <h1>Ecosystem Quiz Matrix</h1> 
        <p>Participate in authorized evaluation slots or synchronize metrics with external coding environments.</p> 
        
        <div class="header-actions-wrapper" style="margin-top: 24px;">
          <div class="quiz-quadrant-grid">

            <div class="quadrant-card">
              <h3 class="quadrant-title">🟢 Active HackerRank Exams</h3>
              <div id="activeExamsContainer" class="quizzes-grid"></div>
            </div>

            <div class="quadrant-card">
              <h3 class="quadrant-title">🟢 Active Quizzes</h3>
              <div id="activeQuizzesContainer" class="quizzes-grid"></div>
            </div>

            <div class="quadrant-card">
              <h3 class="quadrant-title">🕓 Past Exams</h3>
              <div id="pastExamsContainer" class="quizzes-grid"></div>
            </div>

            <div class="quadrant-card">
              <h3 class="quadrant-title">🕓 Past Quizzes</h3>
              <div id="pastQuizzesContainer" class="quizzes-grid"></div>
            </div>

          </div>
        </div>
      </div> 

    </main> 
  </div> 

  <!-- HackerRank కు మాత్రమే ఈ వివరాల మోడల్ ఓపెన్ అవుతుంది -->
  <div class="modal-overlay" id="detailsModal">
    <div class="modal-box">
      <div class="modal-header">Enter Your Details for Exam</div>
      <form id="participantForm">
        <div class="input-group">
          <label style="font-size: 13px; color: var(--text-muted);">Full Name</label>
          <input type="text" id="studentName" class="input-control" required placeholder="e.g. Rahul Kumar">
        </div>
        <div class="input-group">
          <label style="font-size: 13px; color: var(--text-muted);">HackerRank Username ID</label>
          <input type="text" id="studentHrId" class="input-control" required placeholder="e.g. rahul_cse22">
        </div>
        <div class="input-group">
          <label style="font-size: 13px; color: var(--text-muted);">Roll Number / Reg No</label>
          <input type="text" id="studentRollNo" class="input-control" required placeholder="e.g. 22A31A0501">
        </div>
        <div class="input-group">
          <label style="font-size: 13px; color: var(--text-muted);">Branch</label>
          <input type="text" id="studentBranch" class="input-control" required placeholder="e.g. CSE / ECE / IT">
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="closeModalBtn">Cancel</button>
          <button type="submit" class="btn-submit">🚀 Enter & Sync Leaderboard</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaCkliRZk8HmNtOsJpoA084YhNY7MeMWM",
      authDomain: "jigsawconnect-677da.firebaseapp.com",
      databaseURL: "https://jigsawconnect-677da-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jigsawconnect-677da",
      storageBucket: "jigsawconnect-677da.firebasestorage.app",
      messagingSenderId: "200774226361",
      appId: "1:200774226361:web:266cb216968403793f6668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const detailsModal = document.getElementById('detailsModal');
    const participantForm = document.getElementById('participantForm');
    
    let currentTargetLink = "";
    let currentContestSlug = "";

    // 1. HackerRank కార్డ్స్ క్రియేట్ చేయడానికి హెల్పర్ ఫంక్షన్
    function makeExamCard(exam, slug, isPast) {
      const card = document.createElement('div');
      card.className = "panel-card";
      
      const hrLink = isPast 
        ? `https://www.hackerrank.com/contests/${slug}/leaderboard` 
        : `https://www.hackerrank.com/contests/${slug}`;

      card.innerHTML = `
        <div class="panel-title">
          <span>📝 ${exam.title || slug.toUpperCase()}</span>
        </div>
        <button class="hackerrank-btn exam-btn" data-slug="${slug}" data-link="${hrLink}">
          ${isPast ? '👁️ View Past Contest Leaderboard' : '🚀 Enter HackerRank Arena & Start Exam'}
        </button>
      `;
      return card;
    }

    /// 2. క్విజ్ కార్డ్స్ హెల్పర్ ఫంక్షన్ (సరిచేయబడింది)
function makeQuizCard(quiz, key, isPast) {
  const card = document.createElement('div');
  card.className = "panel-card";
  
  // quiz-window.html బదులు take-quiz.html కి మార్చాము
  const quizLink = `take-quiz.html?id=${key}`; 

  card.innerHTML = `
    <div class="panel-title">
      <span>🧠 ${quiz.title || 'Untitled Quiz'}</span>
    </div>
    <button class="hackerrank-btn quiz-btn" style="background: var(--accent-blue); color: white;" data-slug="${key}" data-link="${quizLink}">
      ${isPast ? '👁️ View Results' : '🚀 Start Quiz'}
    </button>
  `;
  return card;
}

    // ఈ ఫంక్షన్ కేవలం బటన్ క్లిక్స్ బైండ్ చేస్తుంది
    function bindCardButtons(container) {
      // హ్యాకర్-ర్యాంక్ కార్డ్స్‌పై క్లిక్ చేస్తే మోడల్ ఓపెన్ అవుతుంది
      container.querySelectorAll('.exam-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTargetLink = btn.getAttribute('data-link');
          currentContestSlug = btn.getAttribute('data-slug');
          detailsModal.classList.add('active');
        });
      });

      // క్విజ్ కార్డ్స్‌పై క్లిక్ చేసినప్పుడు ఎలాంటి వివరాలు అడగదు, నేరుగా ఓపెన్ అవుతుంది!
      container.querySelectorAll('.quiz-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const quizLink = btn.getAttribute('data-link');
          // మీ సిస్టమ్ లో లాగిన్ చెక్ (ఆప్షనల్)
          const currentStudent = localStorage.getItem('studentHrId');
          if (!currentStudent) {
            alert("Please login to attempt this quiz!");
            window.location.href = "index.html";
            return;
          }
          window.open(quizLink, '_blank');
        });
      });
    }

    // HackerRank Form submission
    participantForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('studentName').value.trim();
      const hrId = document.getElementById('studentHrId').value.trim();
      const rollNo = document.getElementById('studentRollNo').value.trim();
      const branch = document.getElementById('studentBranch').value.trim();

      if(!hrId || !currentContestSlug) return;
      const safeKey = hrId.replace(/[.#$\[\]\/]/g, '_');

      try {
        await set(ref(db, `students/${safeKey}`), { name, hrId, rollNo, branch });
        await set(ref(db, `hackerRankLeaderboards/${currentContestSlug}/${safeKey}`), {
          hrId: hrId,
          hackerRankId: hrId,
          name: name,
          rollNo: rollNo,
          branch: branch,
          score: 0,
          timestamp: Date.now()
        });

        detailsModal.classList.remove('active');
        participantForm.reset();
        localStorage.setItem('studentName', name);
        localStorage.setItem('studentHrId', hrId);
        localStorage.setItem('studentRollNo', rollNo);
        localStorage.setItem('studentBranch', branch);
        
        window.open(currentTargetLink, '_blank');
      } catch(err) {
        console.error("Exam registration error:", err);
        alert("Failed to sync metrics.");
      }
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
      detailsModal.classList.remove('active');
    });

    function renderQuizzes(quizzesData) {
      const activeContainer = document.getElementById('activeQuizzesContainer');
      const pastContainer = document.getElementById('pastQuizzesContainer');
      activeContainer.innerHTML = ""; pastContainer.innerHTML = "";

      if (!quizzesData) {
        activeContainer.innerHTML = `<p class="empty-note">No active quizzes right now.</p>`;
        pastContainer.innerHTML = `<p class="empty-note">No past quizzes yet.</p>`;
        return;
      }

      let hasActive = false, hasPast = false;
      Object.keys(quizzesData).forEach(key => {
        const quiz = quizzesData[key];
        const isPast = quiz.status === 'past';
        const card = makeQuizCard(quiz, key, isPast);
        (isPast ? pastContainer : activeContainer).appendChild(card);
        if (isPast) hasPast = true; else hasActive = true;
      });

      if (!hasActive) activeContainer.innerHTML = `<p class="empty-note">No active quizzes right now.</p>`;
      if (!hasPast) pastContainer.innerHTML = `<p class="empty-note">No past quizzes yet.</p>`;

      bindCardButtons(activeContainer);
      bindCardButtons(pastContainer);
    }

    function renderExams(examsData) {
      const activeContainer = document.getElementById('activeExamsContainer');
      const pastContainer = document.getElementById('pastExamsContainer');
      activeContainer.innerHTML = ""; pastContainer.innerHTML = "";

      if (!examsData) {
        activeContainer.innerHTML = `<p class="empty-note">No active HackerRank exams registered currently.</p>`;
        pastContainer.innerHTML = `<p class="empty-note">No past exams yet.</p>`;
        return;
      }

      let hasActive = false, hasPast = false;
      Object.keys(examsData).forEach(key => {
        const exam = examsData[key];
        const isPast = exam.status === 'past';
        const card = makeExamCard(exam, key, isPast);
        (isPast ? pastContainer : activeContainer).appendChild(card);
        if (isPast) hasPast = true; else hasActive = true;
      });

      if (!hasActive) activeContainer.innerHTML = `<p class="empty-note">No active HackerRank exams registered currently.</p>`;
      if (!hasPast) pastContainer.innerHTML = `<p class="empty-note">No past exams yet.</p>`;

      bindCardButtons(activeContainer);
      bindCardButtons(pastContainer);
    }

    onValue(ref(db, "quizzes"), (snapshot) => {
      renderQuizzes(snapshot.exists() ? snapshot.val() : null);
    });

    onValue(ref(db, "hackerrankExams"), (snapshot) => {
      renderExams(snapshot.exists() ? snapshot.val() : null);
    });
  </script>
</body>
</html>
