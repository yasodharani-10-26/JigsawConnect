<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | StudyConnect</title>

<style>
/* =========================
   ROOT
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #06b6d4);
    color: white;
}

/* =========================
   CARD
========================= */
.login-container {
    width: 100%;
    padding: 20px;
}

.login-card {
    max-width: 420px;
    margin: auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* =========================
   HEADER
========================= */
.login-header {
    text-align: center;
    margin-bottom: 25px;
}

.admin-icon {
    font-size: 3.5rem;
    margin-bottom: 10px;
}

.login-header h1 {
    font-size: 1.8rem;
}

.login-header p {
    font-size: 0.9rem;
    opacity: 0.85;
}

/* =========================
   MESSAGE
========================= */
#loginMessage {
    display: none;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    margin-bottom: 15px;
}

/* =========================
   FORM
========================= */
.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.9);
    color: #0f172a;
    transition: 0.3s;
}

input:focus {
    transform: scale(1.02);
    box-shadow: 0 0 0 3px rgba(6,182,212,0.4);
}

/* =========================
   BUTTON
========================= */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: #06b6d4;
    color: white;
    transition: 0.3s;
}

.login-btn:hover {
    background: #0891b2;
    transform: translateY(-2px);
}

/* =========================
   DEMO BOX
========================= */
.demo-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    text-align: center;
    font-size: 14px;
}

.demo-box code {
    background: white;
    color: #0f172a;
    padding: 3px 6px;
    border-radius: 5px;
    font-weight: bold;
}

/* =========================
   BACK LINK
========================= */
.back-home {
    text-align: center;
    margin-top: 15px;
}

.back-home a {
    color: #93c5fd;
    text-decoration: none;
    font-size: 14px;
}

.back-home a:hover {
    color: white;
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 480px) {
    .login-card {
        padding: 25px;
    }

    .login-header h1 {
        font-size: 1.5rem;
    }
}
</style>
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="login-header">
            <div class="admin-icon">👨‍💼</div>
            <h1>Admin Login</h1>
            <p>StudyConnect Administration Portal</p>
        </div>

        <div id="loginMessage"></div>

        <form id="adminLoginForm">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="demo-box">
            Demo Login <br><br>
            Username: <code>admin</code><br><br>
            Password: <code>admin123</code>
        </div>

        <div class="back-home">
            <a href="index.html">⬅ Back to Home</a>
        </div>

    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
