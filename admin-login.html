
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – StudyConnect</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a>
    <button class="menu-toggle" aria-label="Open menu"><span></span><span></span><span></span></button>
    <div class="nav-links">
      <a href="login.html">Back</a>
      <a href="student-login.html">Student Login</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Admin Login</h1>
      <p class="subtitle">Administrator access only</p>
      <div id="loginMessage" class="login-message" style="display:none;"></div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="admin" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter admin password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Login as Admin</button>
      </form>

      <p class="auth-link demo-hint">
        <strong>Demo:</strong> <code>admin</code> / <code>admin123</code>
      </p>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
