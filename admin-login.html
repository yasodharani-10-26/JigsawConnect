
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | StudyConnect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#2563eb,#0f172a),
    radial-gradient(circle at bottom right,#06b6d4,#0f172a);
    padding:20px;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#06b6d4;
    filter:blur(150px);
    opacity:.25;
    top:-100px;
    right:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#2563eb;
    filter:blur(150px);
    opacity:.25;
    bottom:-100px;
    left:-100px;
}

.login-card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:430px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.icon{
    font-size:60px;
    margin-bottom:10px;
}

.header h1{
    color:white;
    margin-bottom:8px;
}

.header p{
    color:#cbd5e1;
    font-size:14px;
}

#loginMessage{
    display:none;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    color:white;
    margin-bottom:6px;
    font-size:14px;
    font-weight:600;
}

input{
    width:100%;
    padding:13px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.9);
    font-size:15px;
}

input:focus{
    box-shadow:0 0 0 3px rgba(6,182,212,.4);
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#06b6d4,#2563eb);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-3px);
}

.links{
    margin-top:18px;
    text-align:center;
}

.links a{
    color:#93c5fd;
    text-decoration:none;
}

.links a:hover{
    color:white;
}

.divider{
    text-align:center;
    color:#cbd5e1;
    margin-top:15px;
    font-size:14px;
}

@media(max-width:480px){
    .login-card{
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <div class="header">
        <div class="icon">🛡️</div>
        <h1>Admin Portal</h1>
        <p>Secure access to StudyConnect Dashboard</p>
    </div>

    <div id="loginMessage"></div>

    <form id="adminLoginForm">

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                id="adminEmail"
                placeholder="admin@example.com"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                id="adminPassword"
                placeholder="Enter password"
                required
            >
        </div>

        <button type="submit" class="login-btn">
            🔐 Login to Dashboard
        </button>

    </form>

    <div class="divider">
        New Admin?
    </div>

    <div class="links">
        <a href="register.html">Create Account</a>
        <br><br>
        <a href="index.html">⬅ Back to Home</a>
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
