<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | JigsawConnect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       ROOT VARIABLES & THEME
       ========================================================================== */
    :root {
      --bg: #090d16;
      --card-bg: rgba(19, 28, 46, 0.4);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --primary: #4f46e5;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.2);
      --status-error-bg: rgba(239, 68, 68, 0.1);
      --status-error-border: rgba(239, 68, 68, 0.2);
      --status-error-text: #f87171;
      --status-success-bg: rgba(16, 185, 129, 0.1);
      --status-success-border: rgba(16, 185, 129, 0.2);
      --status-success-text: #34d399;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Glowing Orbs */
    body::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent);
      filter: blur(160px);
      opacity: 0.15;
      top: -150px;
      right: -150px;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--primary);
      filter: blur(160px);
      opacity: 0.15;
      bottom: -150px;
      left: -150px;
      pointer-events: none;
    }

    /* ==========================================================================
       LOGIN CARD ARCHITECTURE
       ========================================================================== */
    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      padding: 40px;
      border-radius: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
      animation: floatCard 5s ease-in-out infinite;
      transition: border-color 0.3s ease;
    }

    .login-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Pause drifting motion safely while typing */
    .login-card:focus-within {
      animation-play-state: paused;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .icon-wrapper {
      width: 64px;
      height: 64px;
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
      color: var(--accent);
    }

    .header h1 {
      color: var(--text-main);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
    }

    /* ==========================================================================
       DYNAMIC STATUS MESSAGES
       ========================================================================== */
    #loginMessage {
      display: none;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      animation: fadeIn 0.3s ease forwards;
    }

    #loginMessage.error {
      display: block;
      background: var(--status-error-bg);
      border: 1px solid var(--status-error-border);
      color: var(--status-error-text);
    }

    #loginMessage.success {
      display: block;
      background: var(--status-success-bg);
      border: 1px solid var(--status-success-border);
      color: var(--status-success-text);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================================================================
       FORM ELEMENTS
       ========================================================================== */
    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    label {
      display: block;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.25px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      outline: none;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.6);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    /* Padding adjust for password toggle space */
    #adminPassword {
      padding-right: 46px;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    input::placeholder {
      color: #475569;
    }

    /* Interactive eye toggle icon */
    .password-toggle {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .password-toggle:hover {
      color: var(--text-main);
    }

    /* ==========================================================================
       BUTTON & LINKS
       ========================================================================== */
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .links {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
    }

    .links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .links a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .back-home {
      margin-top: 14px;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="header">
      <div class="icon-wrapper">🔑</div>
      <h1>Admin Terminal</h1>
      <p>Access core dashboard node structures</p>
    </div>

    <div id="loginMessage"></div>

    <form id="adminLoginForm" novalidate>
      <div class="form-group">
        <label for="adminEmail">Secure Root Email</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            id="adminEmail" 
            placeholder="root@studyconnect.org" 
            autocomplete="username"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="adminPassword">Master Token Password</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="adminPassword" 
            placeholder="••••••••••••" 
            autocomplete="current-password"
            required
          >
          <button type="button" class="password-toggle" id="togglePassBtn" aria-label="Toggle clear password display text">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn">
        System Authenticate
      </button>
    </form>

    <div class="links">
      <div class="back-home">
        <a href="index.html">⬅ Disconnect & Go Home</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { 
      auth, 
      signInWithEmailAndPassword 
    } from "./firebase.js";

    const form = document.getElementById("adminLoginForm");
    const msg = document.getElementById("loginMessage");
    const togglePassBtn = document.getElementById("togglePassBtn");
    const passwordInput = document.getElementById("adminPassword");

    /* ----- Password Clear-Text Eye Toggler Element Engine ----- */
    togglePassBtn.addEventListener("click", () => {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        togglePassBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
      } else {
        passwordInput.type = "password";
        togglePassBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      }
    });

    /* ----- Form Dispatch Interception Listener ----- */
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const emailEl = document.getElementById("adminEmail");
      const passwordEl = document.getElementById("adminPassword");

      if (!emailEl || !passwordEl) {
        console.error("DOM Error: System controls unavailable.");
        return;
      }

      const email = emailEl.value.trim();
      const password = passwordEl.value; // Unaffected by character space trimming bugs

      // Base Check Validation
      if (!email || !password) {
        msg.className = "error";
        msg.innerText = "Please complete all target inputs.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);

        msg.className = "success";
        msg.innerText = "Root Access Granted. Syncing terminal... ✅";

        setTimeout(() => {
          window.location.href = "admin-dashboard.html";
        }, 1200);

      } catch (error) {
        console.error("Firebase System Catch Exception: ", error);
        msg.className = "error";

        switch (error.code) {
          case "auth/invalid-credential":
          case "auth/wrong-password":
          case "auth/user-not-found":
            msg.innerText = "Access Refused: Credentials invalid.";
            break;
          case "auth/invalid-email":
            msg.innerText = "Format Error: Input email path malformed.";
            break;
          case "auth/user-disabled":
            msg.innerText = "Access Refused: Target administrator deactivated.";
            break;
          default:
            msg.innerText = `Terminal Failure: ${error.message}`;
        }
      }
    });
  </script>
</body>
</html>
