<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Leaderboard | StudyConnect</title> 
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap" rel="stylesheet"> 
   
  <!-- Excel Sheet చదవడానికి లైబ్రరీ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style> 
    :root {
      --bg: #0b0f19; 
      --card-bg: rgba(20, 30, 54, 0.45); 
      --border: rgba(255, 255, 255, 0.08); 
      --text-main: #f8fafc; 
      --text-muted: #94a3b8; 
      --accent-cyan: #06b6d4; 
      --accent-blue: #2563eb; 
      --success: #10b981;
      --warning: #f59e0b;
    } 

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; } 
    body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; } 

    /* NAVBAR */
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 6%; background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; } 
    .logo { font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; } 
    .logo span { color: var(--accent-cyan); } 
    .nav-links { display: flex; gap: 24px; align-items: center; } 
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 600; } 
    .nav-links a.active { color: var(--accent-cyan); } 

    /* MAIN CONTAINER */
    .container { width: 100%; max-width: 1200px; margin: 40px auto; padding: 0 20px; flex: 1; }
    .page-title { font-size: 2rem; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.5px; }
    .page-title span { color: var(--accent-cyan); }

    /* ACTION CONTROLS */
    .controls-wrapper { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    
    .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; }
    .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
    
    .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #fff; padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-cyan); }
    .btn-download { background: var(--accent-blue); border-color: var(--accent-blue); }
    .btn-download:hover { background: #1d4ed8; }
    
    /* LIVE REFRESH INDICATOR */
    .live-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2); }
    .pulse-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.4; } 100% { transform: scale(0.9); opacity: 1; } }

    /* TABLE STYLE */
    .table-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); overflow-x: auto; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
    td { color: var(--text-main); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.02); }

    /* RANKS & BADGES */
    .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 800; font-size: 13px; }
    .rank-1 { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid var(--warning); }
    .rank-2 { background: rgba(241, 245, 249, 0.15); color: #e2e8f0; border: 1px solid #cbd5e1; }
    .rank-3 { background: rgba(180, 83, 9, 0.15); color: #b45309; border: 1px solid #b45309; }
    .rank-other { color: var(--text-muted); font-weight: 700; }

    .hr-id-txt { font-weight: 700; color: #fff; }
    .score-txt { font-weight: 800; color: var(--accent-cyan); font-size: 15px; }
    .badge-info { background: rgba(37, 99, 235, 0.1); color: #60a5fa; padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; border: 1px solid rgba(37, 99, 235, 0.15); }

    /* PAGINATION CONTROLS */
    .pagination-wrapper { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 28px; flex-wrap: wrap; }
    .page-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
    .page-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
    .page-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
  </style> 
</head> 

<body> 

  <nav class="navbar"> 
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a> 
    <div class="nav-links"> 
      <a href="admin-dashboard.html">Dashboard</a> 
      <a href="leaderboard.html" class="active">Leaderboard</a> 
      <a href="quiz.html">Quizzes</a> 
      <a href="index.html">Logout</a> 
    </div> 
  </nav> 

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 10px;">
      <h1 class="page-title" style="margin-bottom: 0;">🏆 Global <span>Leaderboard</span></h1>
      <div class="live-indicator"><span class="pulse-dot"></span> Live Syncing Active</div>
    </div>
    
    <div class="controls-wrapper">
      <div class="upload-btn-wrapper">
        <button class="action-btn">📤 Upload Exam Excel</button>
        <input type="file" id="excelUploadInput" accept=".xlsx, .xls" />
      </div>
      <button class="action-btn btn-download" onclick="downloadLeaderboardExcel()">📥 Download Leaderboard (.xlsx)</button>
    </div>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 80px;">Rank</th>
            <th>Roll Number</th>
            <th>HackerRank ID</th>
            <th>Branch</th>
            <th>Section</th>
            <th>Score Matrix</th>
          </tr>
        </thead>
        <tbody id="leaderboardTableBody">
        </tbody>
      </table>
    </div>

    <div class="pagination-wrapper" id="pagination"></div>
  </div>

  <script>
    let currentPage = 1;
    const rowsPerPage = 20; // ఇక్కడ పేజీకి ఖచ్చితంగా 20 మెంబర్స్ వచ్చేలా మార్చాను.
    let currentLeaderboardData = []; 

    // మెయిన్ లోడ్ ఫంక్షన్ - మార్కుల ఆధారంగా మాత్రమే సార్ట్ అవుతుంది
    function loadLeaderboard() {
      let savedData = JSON.parse(localStorage.getItem('globalLeaderboardList')) || [];
      
      // మార్కుల బట్టి మాత్రమే (High to Low) సార్టింగ్ చేస్తుంది.
      savedData.sort((a, b) => parseFloat(b.score) - parseFloat(a.score));
      currentLeaderboardData = savedData;

      renderTable(currentLeaderboardData, currentPage);
      setupPagination(currentLeaderboardData);
    }

    // EXCEL FILE UPLOAD PROCESSING (పరిమితి లేకుండా అందరినీ యాడ్ చేస్తుంది)
    document.getElementById('excelUploadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        const excelRows = XLSX.utils.sheet_to_json(worksheet);
        
        let updatedList = JSON.parse(localStorage.getItem('globalLeaderboardList')) || [];

        excelRows.forEach(row => {
          let rollNo = String(row["Roll Number"] || "").trim().toUpperCase();
          let hrId = String(row["HackerRank ID"] || "").trim();
          let branch = String(row["Branch"] || "").trim().toUpperCase();
          let section = String(row["Section"] || "").trim().toUpperCase();
          let score = parseFloat(row["Score"] || 0);

          if (rollNo) {
            let existingUserIdx = updatedList.findIndex(u => u.rollNo.toUpperCase() === rollNo);
            
            let userData = {
              rollNo: rollNo,
              hrId: hrId || "N/A",
              branch: branch || "CSE",
              section: section || "A",
              score: score
            };

            // పాత స్టూడెంట్ ఉంటే మార్కులు అప్‌డేట్ అవుతాయి, కొత్త వాళ్లయితే లిస్ట్‌లో యాడ్ అవుతారు
            if (existingUserIdx !== -1) {
              updatedList[existingUserIdx] = userData;
            } else {
              updatedList.push(userData);
            }
          }
        });

        // మార్కుల ఆర్డర్ లోకి మార్చి సేవ్ చేస్తుంది
        updatedList.sort((a, b) => parseFloat(b.score) - parseFloat(a.score));
        localStorage.setItem('globalLeaderboardList', JSON.stringify(updatedList));
        alert('🎯 లీడర్‌బోర్డ్‌ అప్‌డేట్ అయ్యింది! మార్కుల ఆధారంగా ర్యాంకులు కేటాయించబడ్డాయి.');
        
        currentPage = 1; 
        loadLeaderboard();
      };
      
      reader.readAsArrayBuffer(file);
    });

    // DOWNLOAD LEADERBOARD AS EXCEL
    function downloadLeaderboardExcel() {
      if (currentLeaderboardData.length === 0) {
        alert("డౌన్‌లోడ్ చేయడానికి లీడర్‌బోర్డ్‌లో ఎటువంటి డేటా లేదు!");
        return;
      }

      const excelOutputData = currentLeaderboardData.map((user, idx) => ({
        "Rank": idx + 1,
        "Roll Number": user.rollNo,
        "HackerRank ID": user.hrId,
        "Branch": user.branch,
        "Section": user.section,
        "Score": user.score
      }));

      const worksheet = XLSX.utils.json_to_sheet(excelOutputData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Leaderboard");
      XLSX.writeFile(workbook, "StudyConnect_Global_Leaderboard.xlsx");
    }

    // TABLE RENDERING LOGIC
    function renderTable(data, page) {
      const tableBody = document.getElementById('leaderboardTableBody');
      tableBody.innerHTML = "";
      page--;

      let start = rowsPerPage * page;
      let end = start + rowsPerPage;
      let paginatedItems = data.slice(start, end);

      if (paginatedItems.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding: 30px;">డేటా లేదు. క్విజ్ సబ్మిట్ చేయండి లేదా ఎక్సెల్ అప్‌లోడ్ చేయండి.</td></tr>`;
        return;
      }

      paginatedItems.forEach((user, index) => {
        let globalRank = start + index + 1; 
        
        let rankDisplay = `<span class="rank-badge rank-other">#${globalRank}</span>`;
        if (globalRank === 1) rankDisplay = `<span class="rank-badge rank-1">1</span>`;
        else if (globalRank === 2) rankDisplay = `<span class="rank-badge rank-2">2</span>`;
        else if (globalRank === 3) rankDisplay = `<span class="rank-badge rank-3">3</span>`;

        let row = `<tr>
          <td>${rankDisplay}</td>
          <td><span class="hr-id-txt">${user.rollNo || 'N/A'}</span></td>
          <td><span class="text-muted">${user.hrId}</span></td>
          <td><span class="badge-info">${user.branch || 'CSE'}</span></td>
          <td style="color: var(--text-main); font-weight: 500;">${user.section || 'A'}</td>
          <td><span class="score-txt">${parseFloat(user.score).toFixed(2)}</span></td>
        </tr>`;
        tableBody.innerHTML += row;
      });
    }

    // MULTI-PAGE BUTTONS GENERATION
    function setupPagination(data) {
      const paginationWrapper = document.getElementById('pagination');
      paginationWrapper.innerHTML = "";

      let pageCount = Math.ceil(data.length / rowsPerPage);
      if (pageCount <= 1) return; 
      
      for (let i = 1; i <= pageCount; i++) {
        let btn = document.createElement('button');
        btn.innerText = i;
        btn.classList.add('page-btn');
        if (currentPage === i) btn.classList.add('active');

        btn.addEventListener('click', function () {
          currentPage = i;
          renderTable(data, currentPage);
          
          let currentBtn = document.querySelector('.page-btn.active');
          if (currentBtn) currentBtn.classList.remove('active');
          btn.classList.add('active');
          
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        paginationWrapper.appendChild(btn);
      }
    }

    // 10 సెకన్ల ఆటో రీలోడ్
    window.onload = () => {
      loadLeaderboard();
      setInterval(loadLeaderboard, 10000); 
    };
  </script>
</body> 
</html>
