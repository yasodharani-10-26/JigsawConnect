<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Leaderboard | StudyConnect</title> 
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap" rel="stylesheet"> 
   
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style> 
    :root {
      --bg: #0b0f19; 
      --card-bg: rgba(20, 30, 54, 0.45); 
      --border: rgba(255, 255, 255, 0.08); 
      --text-main: #f8fafc; 
      --text-muted: #94a3b8; 
      --accent-cyan: #06b6d4; 
      --accent-blue: #2563eb; 
      --success: #10b981;
      --warning: #f59e0b;
    } 

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; } 
    body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; } 

    /* NAVBAR */
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 6%; background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; } 
    .logo { font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; } 
    .logo span { color: var(--accent-cyan); } 
    .nav-links { display: flex; gap: 24px; align-items: center; } 
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 600; } 
    .nav-links a.active { color: var(--accent-cyan); } 

    /* MAIN CONTAINER */
    .container { width: 100%; max-width: 1200px; margin: 40px auto; padding: 0 20px; flex: 1; }
    .page-title { font-size: 2rem; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.5px; }
    .page-title span { color: var(--accent-cyan); }

    /* SEARCH AND FILTER CONTROLS */
    .filter-section { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 280px; padding: 12px 18px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent-cyan); }

    /* ACTION CONTROLS */
    .controls-wrapper { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    
    .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; }
    .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
    
    .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #fff; padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-cyan); }
    .btn-download { background: var(--accent-blue); border-color: var(--accent-blue); }
    .btn-download:hover { background: #1d4ed8; }
    
    /* INPUT SELECT CONTROL */
    .select-control { padding: 10px 16px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 14px; outline: none; cursor: pointer; min-width: 220px; }
    .select-control option { background: #141e36; color: #fff; }

    /* LIVE REFRESH INDICATOR */
    .live-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2); }
    .pulse-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.4; } 100% { transform: scale(0.9); opacity: 1; } }

    /* TABLE STYLE */
    .table-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); overflow-x: auto; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
    td { color: var(--text-main); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.02); }

    .hr-id-txt { font-weight: 700; color: #fff; }
    .badge-info { background: rgba(37, 99, 235, 0.1); color: #60a5fa; padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; border: 1px solid rgba(37, 99, 235, 0.15); }
    .badge-sec { background: rgba(16, 185, 129, 0.1); color: #34d399; padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; border: 1px solid rgba(16, 185, 129, 0.15); }
    .badge-score { background: rgba(245, 158, 11, 0.1); color: var(--warning); padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 13px; border: 1px solid rgba(245, 158, 11, 0.2); }

    /* PAGINATION CONTROLS */
    .pagination-wrapper { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 28px; flex-wrap: wrap; }
    .page-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
    .page-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
    .page-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
  </style> 
</head> 

<body> 

  <nav class="navbar"> 
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a> 
    <div class="nav-links"> 
      <a href="admin-dashboard.html">Dashboard</a> 
      <a href="leaderboard.html" class="active">Leaderboard</a> 
      <a href="quiz.html">Quizzes</a> 
      <a href="index.html">Logout</a> 
    </div> 
  </nav> 

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 15px;">
      <h1 class="page-title" style="margin-bottom: 0;">🏆 Global <span>Leaderboard</span></h1>
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <select id="contestSelectDropdown" class="select-control">
          <option value="">-- Select Exam Platform --</option>
        </select>
        <div class="live-indicator"><span class="pulse-dot"></span> Dynamic Tracking</div>
      </div>
    </div>
    
    <!-- SEARCH & FILTER BAR -->
    <div class="filter-section">
      <input type="text" id="searchInput" class="search-input" placeholder="Search by Name, Roll Number, or HackerRank ID...">
      <select id="branchFilter" class="select-control" style="min-width: 150px;">
        <option value="">All Branches</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
        <option value="MECH">MECH</option>
        <option value="CIVIL">CIVIL</option>
      </select>
      <select id="sectionFilter" class="select-control" style="min-width: 120px;">
        <option value="">All Sections</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </div>
    
    <div class="controls-wrapper">
      <div class="upload-btn-wrapper">
        <button class="action-btn">📤 Upload Exam Excel</button>
        <input type="file" id="excelUploadInput" accept=".xlsx, .xls" />
      </div>
      <button class="action-btn btn-download" id="downloadExcelBtn">📥 Download Leaderboard (.xlsx)</button>
    </div>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Roll Number</th>
            <th>Name</th>
            <th>HackerRank ID</th>
            <th>Branch</th>
            <th>Section</th>
            <th>Year</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardTableBody">
          <tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:30px;">Please choose an active exam template folder above.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination-wrapper" id="pagination"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaCkliRZk8HmNtOsJpoA084YhNY7MeMWM",
      authDomain: "jigsawconnect-677da.firebaseapp.com",
      databaseURL: "https://jigsawconnect-677da-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jigsawconnect-677da",
      storageBucket: "jigsawconnect-677da.firebasestorage.app",
      messagingSenderId: "200774226361",
      appId: "1:200774226361:web:266cb216968403793f6668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentPage = 1;
    const rowsPerPage = 20; 
    let currentLeaderboardData = [];
    let filteredData = [];
    let selectedExamId = "";
    let leaderboardListenerUnsub = null;

    const contestDropdown = document.getElementById('contestSelectDropdown');
    const searchInput = document.getElementById('searchInput');
    const branchFilter = document.getElementById('branchFilter');
    const sectionFilter = document.getElementById('sectionFilter');

    function cleanIdentifier(id) {
      if (!id) return "";
      return String(id).trim().toLowerCase().replace(/[@\s]/g, '');
    }

    // 🏆 HackerRank ఎక్సెల్ షీట్ లో కాలమ్స్ నుండి స్కోర్ ఎక్స్ట్రాక్ట్ చేసే పవర్ఫుల్ హెల్పర్
    function extractScore(row) {
      if (!row) return 0;
      
      // 1. Direct Field Checks
      const directKeys = ['score', 'Score', 'SCORE', 'marks', 'Marks', 'MARKS'];
      for (let k of directKeys) {
        if (row[k] !== undefined && row[k] !== null && row[k] !== "") {
          let val = parseFloat(row[k]);
          if (!isNaN(val)) return val;
        }
      }

      // 2. HackerRank స్క్రాప్డ్ డేటా ఫార్మాట్ కొరకు (data2 లేదా data3 లో స్కోర్ ఉంటుంది, టైం కాకుండా)
      const fallbacks = ["data2", "data3", "data", "data1"];
      for (let key of fallbacks) {
        if (row[key] !== undefined && row[key] !== null && row[key] !== "") {
          let strVal = String(row[key]).trim();
          // టైమ్‌స్టాంప్స్ (ఉదా: 01:23:45) కాకుండా కేవలం ప్యూర్ నెంబర్ ఉంటే స్కోర్ లా తీసుకుంటుంది
          if (!strVal.includes(':')) {
            let val = parseFloat(strVal);
            if (!isNaN(val)) return val;
          }
        }
      }

      // 3. Regex Dynamic Search (ఏదైనా కాలమ్ పేరు లో score లేదా mark ఉంటే)
      for (let key in row) {
        if (key.toLowerCase().includes("score") || key.toLowerCase().includes("mark")) {
          let val = parseFloat(row[key]);
          if (!isNaN(val)) return val;
        }
      }

      return 0;
    }

    function initContestDropdown() {
      onValue(ref(db, 'hackerrankExams'), (snapshot) => {
        contestDropdown.innerHTML = '<option value="">-- Select Exam Template --</option>';
        if (snapshot.exists()) {
          const exams = snapshot.val();
          Object.keys(exams).forEach(key => {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = exams[key].title || 'Unnamed Exam';
            contestDropdown.appendChild(option);
          });
        }
      });
    }

    contestDropdown.addEventListener('change', (e) => {
      selectedExamId = e.target.value;
      currentPage = 1;
      attachLeaderboardRealtimeSync();
    });

    function applyFilters() {
      const query = cleanIdentifier(searchInput.value);
      const selectedBranch = branchFilter.value.toUpperCase();
      const selectedSection = sectionFilter.value.toUpperCase();

      filteredData = currentLeaderboardData.filter(user => {
        const matchesSearch = !query || 
          cleanIdentifier(user.name).includes(query) || 
          cleanIdentifier(user.rollNo).includes(query) || 
          cleanIdentifier(user.hrId).includes(query);

        const matchesBranch = !selectedBranch || user.branch === selectedBranch;
        const matchesSection = !selectedSection || user.section === selectedSection;

        return matchesSearch && matchesBranch && matchesSection;
      });

      currentPage = 1;
      renderTable(filteredData, currentPage);
      setupPagination(filteredData);
    }

    searchInput.addEventListener('input', applyFilters);
    branchFilter.addEventListener('change', applyFilters);
    sectionFilter.addEventListener('change', applyFilters);

    function attachLeaderboardRealtimeSync() {
      if (leaderboardListenerUnsub) leaderboardListenerUnsub();

      if (!selectedExamId) {
        currentLeaderboardData = [];
        filteredData = [];
        renderTable(currentLeaderboardData, currentPage);
        setupPagination(currentLeaderboardData);
        return;
      }

      leaderboardListenerUnsub = onValue(ref(db, `hackerRankLeaderboards/${selectedExamId}`), async (snapshot) => {
        const scoresObj = snapshot.exists() ? snapshot.val() : {};

        const globalStudentsSnapshot = await get(ref(db, 'students'));
        const globalStudentsMap = globalStudentsSnapshot.exists() ? globalStudentsSnapshot.val() : {};
        const globalStudentsArray = Object.values(globalStudentsMap);

        let synchronizedRoster = [];

        Object.keys(scoresObj).forEach(key => {
          const scoreNode = scoresObj[key];
          
          const dbIdentifier = String(scoreNode.hrId || scoreNode.hackerRankId || key || "").trim();
          const cleanDbId = cleanIdentifier(dbIdentifier);
          
          let finalScore = extractScore(scoreNode);

          // HackerRank ID ని బట్టి స్టూడెంట్స్ డేటాబేస్ నుండి క్రాస్-మ్యాచ్ చేస్తుంది
          let match = globalStudentsArray.find(s => 
            (s.hrId && cleanIdentifier(s.hrId) === cleanDbId) ||
            (s.rollNo && cleanIdentifier(s.rollNo) === cleanDbId)
          );

          if (!match && scoreNode.rollNo && scoreNode.rollNo !== "N/A") {
            const cleanRoll = cleanIdentifier(scoreNode.rollNo);
            match = globalStudentsArray.find(s => 
              s.rollNo && cleanIdentifier(s.rollNo) === cleanRoll
            );
          }

          let finalRollNo = match ? (match.rollNo || "N/A") : (scoreNode.rollNo || dbIdentifier);
          let finalName = match ? (match.name || "Unknown") : (scoreNode.name || "Unknown");
          let finalHrId = match ? (match.hrId || dbIdentifier) : dbIdentifier;
          
          let finalYear = "3rd Year"; // Default fallback
          if (match && match.year) {
            finalYear = match.year;
          } else if (finalRollNo !== "N/A" && finalRollNo.length >= 2) {
            let startYear = finalRollNo.substring(0, 2);
            if (startYear === "25") finalYear = "1st Year";
            else if (startYear === "24") finalYear = "2nd Year";
            else if (startYear === "23") finalYear = "3rd Year";
            else if (startYear === "22") finalYear = "4th Year";
          }

          let rawBranch = match ? (match.branch || "CSE") : (scoreNode.branch || "CSE");
          let rawSection = match ? (match.section || "A") : (scoreNode.section || "A");

          synchronizedRoster.push({
            rollNo: finalRollNo.toUpperCase(),
            name: finalName,
            hrId: finalHrId,
            branch: String(rawBranch).toUpperCase(),
            section: String(rawSection).toUpperCase(),
            year: finalYear,
            score: finalScore
          });
        });

        // స్కోర్ల ఆధారంగా Descending order లో సార్ట్ చేస్తుంది
        synchronizedRoster.sort((a, b) => b.score - a.score);
        currentLeaderboardData = synchronizedRoster;
        
        applyFilters(); 
      });
    }

    // 🎯 EXCEL UPLOAD PARSER UPDATE
    document.getElementById('excelUploadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (!selectedExamId) {
        alert('⚠️ Please select an active Exam Template from dropdown first.');
        e.target.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = async function(evt) {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const excelRows = XLSX.utils.sheet_to_json(worksheet);

        const globalStudentsSnapshot = await get(ref(db, 'students'));
        const globalStudentsMap = globalStudentsSnapshot.exists() ? globalStudentsSnapshot.val() : {};
        const globalStudentsArray = Object.values(globalStudentsMap);

        const scoreUpdates = {};

        excelRows.forEach(row => {
          // 'data' కాలమ్ ని మెయిన్ HackerRank Username ఐడెంటిఫైయర్ గా తీసుకుంటుంది
          let excelIdentifier = String(row["data"] || row["HackerRank ID"] || row["Roll Number"] || row["username"] || row["Username"] || "").trim();
          const cleanExcelId = cleanIdentifier(excelIdentifier);

          if (excelIdentifier) {
            let parsedScore = extractScore(row);

            let match = globalStudentsArray.find(s => 
              (s.hrId && cleanIdentifier(s.hrId) === cleanExcelId) ||
              (s.rollNo && cleanIdentifier(s.rollNo) === cleanExcelId)
            );

            let finalTargetKey = match && match.hrId ? match.hrId : excelIdentifier;
            const safeDbKey = finalTargetKey.replace(/[.#$\[\]\/]/g, '_');

            // Firebase లోకి స్కోర్ తో పాటు మిగతా మెటాడేటాను కూడా పంపిస్తున్నాం
            scoreUpdates[safeDbKey] = {
              hrId: finalTargetKey,
              name: match ? match.name : (row["Name"] || "Unknown"),
              rollNo: match ? match.rollNo : (excelIdentifier.match(/^\d/) ? excelIdentifier.toUpperCase() : "N/A"),
              branch: match ? (match.branch || "CSE") : (row["Branch"] || "CSE"),
              section: match ? (match.section || "A") : (row["Section"] || "A"),
              score: parsedScore,
              data2: row["data2"] || "",
              data3: row["data3"] || ""
            };
          }
        });

        try {
          await update(ref(db, `hackerRankLeaderboards/${selectedExamId}`), scoreUpdates);
          alert('🎯 HackerRank Scores extracted and saved successfully!');
          currentPage = 1;
        } catch (error) {
          alert('❌ Firebase Sync Error: ' + error.message);
        }
      };
      reader.readAsArrayBuffer(file);
    });

    function renderTable(data, page) {
      const tableBody = document.getElementById('leaderboardTableBody');
      tableBody.innerHTML = "";
      page--;

      let start = rowsPerPage * page;
      let end = start + rowsPerPage;
      let paginatedItems = data.slice(start, end);

      if (paginatedItems.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:30px;">No records found matching criteria.</td></tr>`;
        return;
      }

      paginatedItems.forEach((user) => {
        let row = `<tr>
          <td><span class="badge-info" style="background:rgba(255,255,255,0.05); color:#fff;">${user.rollNo}</span></td>
          <td><span class="hr-id-txt">${user.name}</span></td>
          <td><span class="text-muted">${user.hrId}</span></td>
          <td><span class="badge-info">${user.branch}</span></td>
          <td><span class="badge-sec">${user.section}</span></td>
          <td style="color: var(--text-main); font-weight: 500;">${user.year}</td>
          <td><span class="badge-score">${user.score.toFixed(2)}</span></td>
        </tr>`;
        tableBody.innerHTML += row;
      });
    }

    function setupPagination(data) {
      const paginationWrapper = document.getElementById('pagination');
      paginationWrapper.innerHTML = "";

      let pageCount = Math.ceil(data.length / rowsPerPage);
      if (pageCount <= 1) return; 
      
      for (let i = 1; i <= pageCount; i++) {
        let btn = document.createElement('button');
        btn.innerText = i;
        btn.classList.add('page-btn');
        if (currentPage === i) btn.classList.add('active');

        btn.addEventListener('click', function () {
          currentPage = i;
          renderTable(data, currentPage);
          
          let currentBtn = document.querySelector('.page-btn.active');
          if (currentBtn) currentBtn.classList.remove('active');
          btn.classList.add('active');
          
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        paginationWrapper.appendChild(btn);
      }
    }

    document.getElementById('downloadExcelBtn').addEventListener('click', () => {
      const downloadData = filteredData.length > 0 ? filteredData : currentLeaderboardData;
      if (downloadData.length === 0) {
        alert("No data available to download.");
        return;
      }

      const excelOutputData = downloadData.map((user) => ({
        "Roll Number": user.rollNo,
        "Name": user.name,
        "HackerRank ID": user.hrId,
        "Branch": user.branch,
        "Section": user.section,
        "Year": user.year,
        "Score": user.score
      }));

      const worksheet = XLSX.utils.json_to_sheet(excelOutputData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Leaderboard");
      XLSX.writeFile(workbook, "StudyConnect_Leaderboard.xlsx");
    });

    window.onload = () => {
      initContestDropdown();
    };
  </script>
</body> 
</html>
