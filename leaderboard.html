<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Leaderboard | StudyConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(20, 30, 54, 0.45);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-cyan: #06b6d4;
      --accent-blue: #2563eb;
      --gold: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 6%;
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
    }

    .logo span {
      color: var(--accent-cyan);
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--accent-cyan);
    }

    .page-header {
      padding: 40px 24px;
      text-align: center;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(6, 182, 212, 0.05));
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .leaderboard-container {
      max-width: 950px;
      width: 100%;
      margin: 30px auto;
      padding: 0 24px;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.2);
    }

    .leaderboard-table th, .leaderboard-table td {
      padding: 16px 20px;
      text-align: left;
    }

    .leaderboard-table th {
      background: rgba(15, 23, 42, 0.8);
      color: var(--accent-cyan);
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    .leaderboard-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .rank-badge {
      display: inline-block;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.1);
    }

    .rank-1 .rank-badge { background: #f59e0b; color: #000; }
    .rank-2 .rank-badge { background: #cbd5e1; color: #000; }
    .rank-3 .rank-badge { background: #b45309; color: #000; }

    .loading-text {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .footer {
      text-align: center;
      padding: 35px 24px;
      margin-top: auto;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">📚 Study<span>Connect</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="discussions.html">Discussions</a>
      <a href="quiz.html">Quiz</a>
      <a href="./leaderboard.html" class="active">Leaderboard</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>🏆 Global Leaderboard</h1>
    <p style="color: var(--text-muted); margin-top: 5px;">Real-time student assessment performance matrices</p>
  </header>

  <main class="leaderboard-container">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Student Name</th>
          <th>Quiz Topic</th>
          <th>Score</th>
          <th>Efficiency</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody">
        <tr>
          <td colspan="5" class="loading-text">Fetching Live Leaderboard Data...</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer class="footer">
    <p>&copy; 2026 StudyConnect | Connect &bull; Collaborate &bull; Succeed 🚀</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaCkliRZk8HmNtOsJpoA084YhNY7MeMWM",
      authDomain: "jigsawconnect-677da.firebaseapp.com",
      databaseURL: "https://jigsawconnect-677da-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jigsawconnect-677da",
      storageBucket: "jigsawconnect-677da.firebasestorage.app",
      messagingSenderId: "200774226361",
      appId: "1:200774226361:web:266cb216968403793f6668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function loadLeaderboard() {
      const tbody = document.getElementById("leaderboardBody");
      try {
        const snapshot = await get(ref(db, "quizScores"));
        if (snapshot.exists()) {
          const data = snapshot.val();
          
          // Convert object to array and sort by percentage (descending)
          const scoresArray = Object.values(data).sort((a, b) => b.percentage - a.percentage);
          
          tbody.innerHTML = "";
          scoresArray.forEach((user, index) => {
            const rank = index + 1;
            let rankClass = "";
            if (rank === 1) rankClass = "rank-1";
            else if (rank === 2) rankClass = "rank-2";
            else if (rank === 3) rankClass = "rank-3";

            const tr = document.createElement("tr");
            tr.className = rankClass;
            tr.innerHTML = `
              <td><span class="rank-badge">${rank}</span></td>
              <td style="font-weight: 700;">${user.username || 'Anonymous'}</td>
              <td>${user.quizTitle || 'General'}</td>
              <td>${user.score} / ${user.totalQuestions}</td>
              <td style="color: var(--accent-cyan); font-weight: 700;">${user.percentage}%</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="5" class="loading-text">No quiz submissions found yet.</td></tr>';
        }
      } catch (err) {
        console.error("Error loading leaderboard:", err);
        tbody.innerHTML = '<tr><td colspan="5" class="loading-text" style="color: red;">Error loading scoreboard data.</td></tr>';
      }
    }

    document.addEventListener("DOMContentLoaded", loadLeaderboard);
  </script>
</body>
</html>
