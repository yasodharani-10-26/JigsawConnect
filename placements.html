    /* ==========================================================================
       GLOBAL MATRIX & GLASSMORPHISM THEME
       ========================================================================== */
    :root {
      --bg: #070a13;
      --card-bg: rgba(16, 24, 42, 0.45);
      --border: rgba(255, 255, 255, 0.06);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #4f46e5;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.15);
      --success: #10b981;
      --warning: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text-main);
      background: 
        radial-gradient(circle at 10% 10%, rgba(79, 70, 229, 0.12), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08), transparent 40%),
        var(--bg);
      background-attachment: fixed;
      padding-bottom: 80px;
      line-height: 1.5;
    }

    /* ==========================================================================
       NAVIGATION HEADER
       ========================================================================== */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(7, 10, 19, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .logo {
      text-decoration: none;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
    }

    .logo span { color: var(--accent); }

    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 600; }
    .nav-links a.active { color: var(--accent); }

    /* ==========================================================================
       HERO CONTROL STATION
       ========================================================================== */
    .page-header {
      padding: 140px 20px 30px;
      text-align: center;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-header p { color: var(--text-muted); font-size: 1rem; }

    /* ==========================================================================
       BRANCH CONTROLLER GRID (11 BRANCHES)
       ========================================================================== */
    .main-container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .branch-selector-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 16px;
      text-align: center;
      font-weight: 700;
    }

    .branch-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .branch-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .branch-btn:hover, .branch-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: rgba(6, 182, 212, 0.12);
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-2px);
    }

    /* ==========================================================================
       DYNAMIC ARCHITECTURE GRID LAYOUT
       ========================================================================== */
    .portal-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
    }

    @media (max-width: 968px) {
      .portal-layout { grid-template-columns: 1fr; }
    }

    .section-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.4s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-card h2 { font-size: 24px; font-weight: 800; margin-bottom: 6px; color: #fff; }
    .role-title { font-size: 18px; color: var(--accent); font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;}

    .list-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #cbd5e1; margin-bottom: 12px; letter-spacing: 0.5px; }
    
    .data-list { list-style: none; margin-bottom: 24px; }
    .data-list li { font-size: 14px; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px; }
    .data-list li::before { content: "▹"; color: var(--accent); font-weight: bold; }
    .data-list strong { color: #f1f5f9; }

    /* ==========================================================================
       INTERACTIVE LABS (TEST & INTERVIEW BOXES)
       ========================================================================== */
    .lab-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .lab-box h4 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .lab-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }

    .meta-tags { display: flex; gap: 12px; margin-bottom: 14px; font-size: 12px; font-weight: 600; }
    .tag { padding: 4px 10px; border-radius: 6px; background: rgba(255, 255, 255, 0.05); color: #cbd5e1; }
    .tag-accent { background: rgba(6, 182, 212, 0.1); color: var(--accent); }

    /* ==========================================================================
       BUTTON INFRASTRUCTURE
       ========================================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-primary { background: linear-gradient(135deg, var(--primary), #6366f1); color: #fff; }
    .btn-primary:hover { box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); transform: translateY(-1px); }
    
    .btn-outline { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: #fff; }
    .btn-outline:hover { background: #fff; color: #000; }

    .footer { text-align: center; margin-top: 60px; padding: 30px; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border); }
    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    @media (max-width: 480px) { .btn-group { flex-direction: column; } }
  </style>
</head>
